<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#textGradient)" stroke-width="2"/>
  <circle cx="100" cy="100" r="90" fill="url(#textGradient)" opacity="0.08"/>
  
  <!-- AS Monogram -->
  <text x="100" y="120" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="bold" text-anchor="middle" fill="url(#textGradient)">
    AS
  </text>
  
  <!-- Dot separator -->
  <circle cx="100" cy="145" r="3" fill="url(#textGradient)" opacity="0.6"/>
</svg>