<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="120" height="120">
  <defs>
    <linearGradient id="minimalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Square background -->
  <rect x="10" y="10" width="100" height="100" rx="12" fill="url(#minimalGradient)" opacity="0.1" stroke="url(#minimalGradient)" stroke-width="1.5"/>
  
  <!-- AS Text - centered -->
  <text x="60" y="75" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" text-anchor="middle" fill="url(#minimalGradient)" letter-spacing="-2">
    AS
  </text>
</svg>