<svg viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg" width="400" height="100">
  <defs>
    <linearGradient id="textLogoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main text -->
  <text x="10" y="70" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="url(#textLogoGradient)" letter-spacing="2">
    ASHWIN STREAM
  </text>
  
  <!-- Underline accent -->
  <line x1="10" y1="80" x2="390" y2="80" stroke="url(#textLogoGradient)" stroke-width="2" opacity="0.5"/>
